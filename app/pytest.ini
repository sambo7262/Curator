# Pins pytest's rootdir to app/ when invoked from here, so it never scans the repo root (Curator/)
# during collection. Background: the root pyproject.toml's [tool.pytest.ini_options] makes rootdir
# Curator/, and pytest's collection stat()s every entry there — including .env.example — which the
# enterprise sandbox denies (Operation not permitted), aborting collection before any test runs.
# With this file present, `python3 -m pytest` from app/ resolves rootdir=app/ and the parent is never
# touched. pytest uses ONE inifile per run, so CI invoked from the repo root still uses pyproject.toml
# (rootdir=Curator/) unchanged — this only affects runs started inside app/.
#
# Mirrors the root pyproject settings, rebased to app/ as rootdir:
#   pythonpath = .      (was ["app"] from Curator/) — so `import main` / `import core...` resolve
#   testpaths  = tests  (was ["app/tests"])
#
# NOTE: this does NOT fix the separate enterprise-proxy issue — the 3 tests that build a real
# httpx.Client() fail when ALL_PROXY=socks5h://... is set (old httpx rejects the socks5h scheme).
# To run a fully-green suite under enterprise creds, strip the proxy env first:
#   env -u ALL_PROXY -u all_proxy -u HTTPS_PROXY -u https_proxy python3 -m pytest -q
[pytest]
pythonpath = .
testpaths = tests
addopts = -q
